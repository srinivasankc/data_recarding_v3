name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.10.2'
        arch: 'win64_mingw'

    - name: Setup MinGW
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64

    - name: Configure
      run: cmake -B build -S . -G "MinGW Makefiles"

    - name: Build
      run: cmake --build build --config Release

    - name: Deploy Qt
      shell: cmd
      run: |
        for /r build %%f in (*.exe) do (
          windeployqt "%%f"
        )

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: TrainTechData-Windows
        path: build
