name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          arch: win64_mingw

      - name: Configure
        shell: bash
        run: |
          cmake -B build \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        run: |
          cmake --build build --parallel

      - name: Find EXE
        shell: bash
        run: |
          find build -name "*.exe"

      - name: Deploy Qt
        shell: bash
        run: |
          mkdir -p Release
          EXE=$(find build -name "*.exe" | head -n 1)
          windeployqt "$EXE"
          cp "$EXE" Release/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrainTechData-Windows
          path: Release
