name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          arch: 'win64_mingw'

      - name: Configure
        shell: cmd
        run: |
          qt-cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: cmd
        run: |
          cmake --build build --config Release

      - name: Deploy Qt
        shell: cmd
        run: |
          if not exist Release mkdir Release
          for /r build %%f in (*.exe) do (
            windeployqt "%%f"
            copy "%%f" Release\
          )

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrainTechData-Windows
          path: Release
