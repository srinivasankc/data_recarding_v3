name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          arch: 'win64_msvc2022_64'

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_CXX_STANDARD=17 `
            -DCMAKE_CXX_FLAGS="/Zc:__cplusplus"

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release

      - name: Deploy Qt
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force Release
          $exe = Get-ChildItem build -Recurse *.exe | Select-Object -First 1
          windeployqt $exe.FullName
          Copy-Item $exe.FullName Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrainTechData-Windows
          path: Release
