name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          arch: win64_mingw81

      - name: Setup MinGW
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      - name: Show Versions
        shell: cmd
        run: |
          qmake -v
          gcc --version

      - name: Configure
        shell: cmd
        run: |
          qmake traintechdata.pro

      - name: Build
        shell: cmd
        run: |
          mingw32-make -j4

      - name: Create Release Folder
        shell: cmd
        run: |
          mkdir Release
          copy release\traintechdata.exe Release\ || copy traintechdata.exe Release\

      - name: Deploy Qt
        shell: cmd
        run: |
          windeployqt Release\traintechdata.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: TrainTechData-Windows
          path: Release
